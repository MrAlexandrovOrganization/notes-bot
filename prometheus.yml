global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'core'
    static_configs:
      - targets: ['core:9100']

  - job_name: 'notifications'
    static_configs:
      - targets: ['notifications:9101']

  - job_name: 'telegram'
    static_configs:
      - targets: ['telegram:9102']
