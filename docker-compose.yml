version: '3.8'

services:
  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - NOTES_DIR=/notes
      - GRPC_PORT=50051
    healthcheck:
      test: ["CMD", "python", "-m", "core.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram:
    build:
      context: .
      dockerfile: frontends/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
    depends_on:
      core:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
