networks:
  default: {}
  whisper-net:
    external: true

services:
  jaeger:
    image: jaegertracing/jaeger:2.4.0
    restart: unless-stopped
    command: ["--config=/etc/jaeger/config.yaml"]
    ports:
      - "127.0.0.1:16686:16686"
    volumes:
      - ./jaeger.yaml:/etc/jaeger/config.yaml:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-notifications}
      - POSTGRES_USER=${DB_USER:-notif}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-notif}", "-d", "${DB_NAME:-notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redisinsight:
    image: redis/redisinsight:3.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - NOTES_DIR=/notes
      - GRPC_PORT=50051
      - METRICS_PORT=9100
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    depends_on:
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    restart: unless-stopped
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notifications:
    build:
      context: .
      dockerfile: notifications/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-notifications}
      - DB_USER=${DB_USER:-notif}
      - DB_PASSWORD=${DB_PASSWORD}
      - GRPC_PORT=50052
      - METRICS_PORT=9101
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      jaeger:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:0.18.2
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1       # CPU: одна задача одновременно
      - OLLAMA_MAX_LOADED_MODELS=1  # держать в памяти только одну модель
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=false  # локальный доступ без авторизации
    depends_on:
      ollama:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram:
    build:
      context: .
      dockerfile: frontends/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - NOTIFICATIONS_GRPC_HOST=notifications
      - NOTIFICATIONS_GRPC_PORT=50052
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - METRICS_PORT=9102
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - LLM_HOST=ollama
      - LLM_PORT=11434
      - LLM_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    networks:
      - default
      - whisper-net  # shared Whisper transcription service
    depends_on:
      redis:
        condition: service_healthy
      core:
        condition: service_healthy
      jaeger:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v3.4.0
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - core
      - notifications
      - telegram
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:12.0.0
    restart: unless-stopped
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_INSTALL_PLUGINS=marcusolsson-calendar-panel
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  pgadmin_data:
  kafka_data:
  redisinsight_data:
  prometheus_data:
  grafana_data:
  ollama_data:
  open_webui_data:
