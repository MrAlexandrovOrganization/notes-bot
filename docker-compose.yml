networks:
  default: {}
  whisper-net:
    external: true
  ollama-net:
    external: true
  monitoring-net:
    external: true
  kafka-net:
    external: true
  redis-net:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-notifications}
      - POSTGRES_USER=${DB_USER:-notif}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-notif}", "-d", "${DB_NAME:-notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  pgadmin:
    image: dpage/pgadmin4:9.13.0
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  core:
    container_name: notes-bot-core
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - NOTES_DIR=/notes
      - GRPC_PORT=50051
      - METRICS_PORT=9100
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - default
      - monitoring-net
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notifications:
    container_name: notes-bot-notifications
    build:
      context: .
      dockerfile: notifications/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-notifications}
      - DB_USER=${DB_USER:-notif}
      - DB_PASSWORD=${DB_PASSWORD}
      - GRPC_PORT=50052
      - METRICS_PORT=9101
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - default
      - monitoring-net
      - kafka-net
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      core:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram:
    container_name: notes-bot-telegram
    build:
      context: .
      dockerfile: frontends/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - NOTIFICATIONS_GRPC_HOST=notifications
      - NOTIFICATIONS_GRPC_PORT=50052
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - METRICS_PORT=9102
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - LLM_HOST=ollama
      - LLM_PORT=11434
      - LLM_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    networks:
      - default
      - whisper-net    # shared Whisper transcription service
      - ollama-net     # shared Ollama LLM service
      - monitoring-net
      - kafka-net
      - redis-net
    depends_on:
      core:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  pgadmin_data:
