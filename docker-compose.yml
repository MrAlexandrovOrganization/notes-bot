services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-notifications}
      - POSTGRES_USER=${DB_USER:-notif}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-notif}", "-d", "${DB_NAME:-notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - NOTES_DIR=/notes
      - GRPC_PORT=50051
    healthcheck:
      test: ["CMD", "python", "-m", "core.healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notifications:
    build:
      context: .
      dockerfile: notifications/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-notifications}
      - DB_USER=${DB_USER:-notif}
      - DB_PASSWORD=${DB_PASSWORD}
      - GRPC_PORT=50052
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
    depends_on:
      postgres:
        condition: service_healthy
      core:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  whisper:
    build:
      context: .
      dockerfile: whisper/Dockerfile
    restart: unless-stopped
    environment:
      - GRPC_PORT=50053
      - WHISPER_MODEL=small # base/small/medium/large/turbo
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  telegram:
    build:
      context: .
      dockerfile: frontends/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - NOTIFICATIONS_GRPC_HOST=notifications
      - NOTIFICATIONS_GRPC_PORT=50052
      - WHISPER_GRPC_HOST=whisper
      - WHISPER_GRPC_PORT=50053
    depends_on:
      core:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
