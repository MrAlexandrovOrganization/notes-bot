networks:
  default: {}
  whisper-net:
    external: true
  ollama-net:
    external: true
  monitoring-net:
    external: true
  kafka-net:
    external: true
  redis-net:
    external: true

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-notifications}
      - POSTGRES_USER=${DB_USER:-notif}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER:-notif}", "-d", "${DB_NAME:-notifications}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    extends:
      file: docker-compose.base.yml
      service: base

  core:
    container_name: notes-bot-core
    build:
      context: .
      dockerfile: core/Dockerfile
    restart: unless-stopped
    volumes:
      - ${NOTES_DIR}:/notes:rw
    environment:
      - NOTES_DIR=/notes
      - GRPC_PORT=50051
      - METRICS_PORT=9100
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - default
      - monitoring-net
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50051"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    extends:
      file: docker-compose.base.yml
      service: base

  notifications:
    container_name: notes-bot-notifications
    build:
      context: .
      dockerfile: notifications/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-notifications}
      - DB_USER=${DB_USER:-notif}
      - DB_PASSWORD=${DB_PASSWORD}
      - GRPC_PORT=50052
      - METRICS_PORT=9101
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - default
      - monitoring-net
      - kafka-net
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50052"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      core:
        condition: service_healthy
    extends:
      file: docker-compose.base.yml
      service: base

  postgres-search:
    image: pgvector/pgvector:pg16
    container_name: notes-bot-postgres-search
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${SEARCH_DB_NAME:-search}
      - POSTGRES_USER=${SEARCH_DB_USER:-search}
      - POSTGRES_PASSWORD=${SEARCH_DB_PASSWORD}
    volumes:
      - postgres_search_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${SEARCH_DB_USER:-search}", "-d", "${SEARCH_DB_NAME:-search}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    extends:
      file: docker-compose.base.yml
      service: base

  search:
    container_name: notes-bot-search
    build:
      context: .
      dockerfile: search/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${NOTES_DIR}:/notes:ro
    ports:
      # Local-only — for `make search-metrics` to curl /metrics without
      # round-tripping through a docker-run pull.
      - "127.0.0.1:9103:9103"
    environment:
      - DB_HOST=postgres-search
      - DB_PORT=5432
      - DB_NAME=${SEARCH_DB_NAME:-search}
      - DB_USER=${SEARCH_DB_USER:-search}
      - DB_PASSWORD=${SEARCH_DB_PASSWORD}
      - GRPC_PORT=50054
      - METRICS_PORT=9103
      - NOTES_DIR=/notes
      - INDEX_INTERVAL=${SEARCH_INDEX_INTERVAL:-5m}
      - LLM_HOST=ollama
      - LLM_PORT=11434
      - EMBED_MODEL=${SEARCH_EMBED_MODEL:-bge-m3}
      - EMBED_DIM=${SEARCH_EMBED_DIM:-1024}
      - ENABLE_EMBEDDINGS=${SEARCH_ENABLE_EMBEDDINGS:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    networks:
      - default
      - ollama-net
      - monitoring-net
    healthcheck:
      test: ["CMD", "/grpc_health_probe", "-addr=:50054"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      postgres-search:
        condition: service_healthy
      core:
        condition: service_healthy
    extends:
      file: docker-compose.base.yml
      service: base

  telegram:
    container_name: notes-bot-telegram
    build:
      context: .
      dockerfile: frontends/telegram/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - CORE_GRPC_HOST=core
      - CORE_GRPC_PORT=50051
      - NOTIFICATIONS_GRPC_HOST=notifications
      - NOTIFICATIONS_GRPC_PORT=50052
      - WHISPER_GRPC_HOST=whisper-ingress
      - WHISPER_GRPC_PORT=50053
      - SEARCH_GRPC_HOST=search
      - SEARCH_GRPC_PORT=50054
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - METRICS_PORT=9102
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - LLM_HOST=ollama
      - LLM_PORT=11434
      - LLM_MODEL=${OLLAMA_MODEL:-qwen3.5:2b}
    networks:
      - default
      - whisper-net    # shared Whisper transcription service
      - ollama-net     # shared Ollama LLM service
      - monitoring-net
      - kafka-net
      - redis-net
    depends_on:
      core:
        condition: service_healthy
      search:
        condition: service_healthy
    extends:
      file: docker-compose.base.yml
      service: base

volumes:
  postgres_data:
  postgres_search_data:
