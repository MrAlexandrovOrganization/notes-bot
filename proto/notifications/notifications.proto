syntax = "proto3";

package notifications;

import "google/protobuf/timestamp.proto";

option go_package = "notes-bot/proto/notifications";

service NotificationsService {
  rpc CreateReminder(CreateReminderRequest) returns (ReminderResponse);
  rpc ListReminders(ListRemindersRequest) returns (ListRemindersResponse);
  rpc DeleteReminder(DeleteReminderRequest) returns (SuccessResponse);
  rpc PostponeReminder(PostponeReminderRequest) returns (ReminderResponse);
  rpc StoreLocation(StoreLocationRequest) returns (LocationResponse);
  rpc GetLatestLocation(GetLatestLocationRequest) returns (LocationResponse);
  rpc GetLocationHistory(GetLocationHistoryRequest) returns (LocationHistoryResponse);
  rpc ToggleLocationTracking(ToggleLocationTrackingRequest) returns (LocationTrackingResponse);
  rpc GetLocationTrackingStatus(GetLocationTrackingRequest) returns (LocationTrackingResponse);
}

// ScheduleParams carries the typed parameters for a reminder schedule.
// The oneof `extra` holds the schedule-type-specific fields; hour/minute and
// tz_offset are common to all types (except "once" which also uses hour/minute).
message ScheduleParams {
  int32 hour      = 1;
  int32 minute    = 2;
  int32 tz_offset = 3;

  message WeeklyExtra     { repeated int32 days = 1; }           // 0=Mon … 6=Sun
  message MonthlyExtra    { int32 day_of_month = 1; }            // 1–31
  message YearlyExtra     { int32 month = 1; int32 day = 2; }   // month 1–12, day 1–31
  message OnceExtra       { string date = 1; }                   // YYYY-MM-DD
  message CustomDaysExtra { int32 interval_days = 1; }

  oneof extra {
    WeeklyExtra     weekly      = 4;
    MonthlyExtra    monthly     = 5;
    YearlyExtra     yearly      = 6;
    OnceExtra       once        = 7;
    CustomDaysExtra custom_days = 8;
  }
}

message Reminder {
  int64 id = 1;
  int64 user_id = 2;
  string title = 3;
  string schedule_type = 4;
  google.protobuf.Timestamp next_fire_at = 5;
  bool is_active = 6;
  bool create_task = 7;
}

message CreateReminderRequest {
  int64 user_id = 1;
  string title = 2;
  string schedule_type = 3;
  ScheduleParams schedule_params = 4;
  bool create_task = 5;
}

message ListRemindersRequest {
  int64 user_id = 1;
}

message ListRemindersResponse {
  repeated Reminder reminders = 1;
}

message DeleteReminderRequest {
  int64 reminder_id = 1;
  int64 user_id = 2;
}

message PostponeReminderRequest {
  int64 reminder_id = 1;
  int64 user_id = 2;
  int32 postpone_minutes = 3;
}

message ReminderResponse {
  bool success = 1;
  Reminder reminder = 2;
}

message SuccessResponse {
  bool success = 1;
}

message LocationRecord {
  int64 id = 1;
  int64 user_id = 2;
  double latitude = 3;
  double longitude = 4;
  double accuracy = 5;
  double altitude = 6;
  double heading = 7;
  double speed = 8;
  string source = 9;
  int64 live_message_id = 10;
  google.protobuf.Timestamp recorded_at = 11;
}

message StoreLocationRequest {
  int64 user_id = 1;
  double latitude = 2;
  double longitude = 3;
  double accuracy = 4;
  double altitude = 5;
  double heading = 6;
  double speed = 7;
  string source = 8;
  int64 live_message_id = 9;
}

message GetLatestLocationRequest {
  int64 user_id = 1;
}

message GetLocationHistoryRequest {
  int64 user_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message LocationHistoryResponse {
  repeated LocationRecord locations = 1;
}

message ToggleLocationTrackingRequest {
  int64 user_id = 1;
  bool active = 2;
}

message GetLocationTrackingRequest {
  int64 user_id = 1;
}

message LocationTrackingResponse {
  bool is_active = 1;
  LocationRecord latest_location = 2;
}

message LocationResponse {
  bool success = 1;
  LocationRecord location = 2;
}
