syntax = "proto3";

package whisper;

option go_package = "notes-bot/proto/whisper";

service TranscriptionService {
  // Synchronous (legacy) — client streams audio, blocks until done.
  rpc Transcribe(stream TranscribeChunk) returns (TranscribeResponse);

  // Async — client streams audio, gets job_id immediately.
  rpc Submit(stream TranscribeChunk) returns (SubmitResponse);

  // Poll job status and result.
  rpc GetStatus(StatusRequest) returns (StatusResponse);
}

// Sent by the client one chunk at a time.
// The first chunk MUST have a non-empty format field ("ogg", "mp4", etc.).
message TranscribeChunk {
  bytes  data   = 1;
  string format = 2;
}

message TranscribeResponse {
  string text = 1;
}

message SubmitResponse {
  string job_id         = 1;
  int32  queue_position = 2;
}

message StatusRequest {
  string job_id = 1;
}

enum JobStatus {
  PENDING = 0;
  RUNNING = 1;
  DONE    = 2;
  FAILED  = 3;
}

message StatusResponse {
  string    job_id = 1;
  JobStatus status = 2;
  string    text   = 3;
  string    error  = 4;
}
