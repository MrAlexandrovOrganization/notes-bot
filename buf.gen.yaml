version: v2
inputs:
  - directory: proto
plugins:
  - local: protoc-gen-go
    out: .
    opt:
      - module=notes-bot
      # Override go_package for whisper.proto so syncing from an external repo
      # does not require patching the file with sed.
      - Mwhisper/whisper.proto=notes-bot/proto/whisper
  - local: protoc-gen-go-grpc
    out: .
    opt:
      - module=notes-bot
      - Mwhisper/whisper.proto=notes-bot/proto/whisper
      - require_unimplemented_servers=false
